<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Main Navigation</title>
  <style>
    :root {
      --bg: #0f1720;
      --panel: #172433;
      --text: #e7eef7;
      --muted: #a9b8ca;
      --border: #2d3f56;
      --accent: #63c9ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(99, 201, 255, 0.18) 0%, transparent 45%),
        radial-gradient(circle at 90% 95%, rgba(99, 201, 255, 0.12) 0%, transparent 40%),
        var(--bg);
    }

    main {
      width: min(760px, 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
      background: var(--panel);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.4rem;
      letter-spacing: 0.02em;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
    }

    nav {
      display: grid;
      gap: 10px;
    }

    a {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.02);
      transition: border-color 0.15s ease, transform 0.15s ease;
    }

    a:hover,
    a:focus-visible {
      border-color: var(--accent);
      transform: translateY(-1px);
      outline: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Main Navigation</h1>
    <p>Select a destination:</p>
    <nav>
      <a href="test_base_2026.html">Test Base 2026</a>
      <a href="part_number_radar.html">Part Number Browser</a>
    </nav>
  </main>
</body>
</html>
