<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>miniPCB Catalog Browser</title>
  <style>
    :root {
      --bg: #0f1720;
      --panel: #172433;
      --panel-alt: #1d2c3d;
      --text: #e7eef7;
      --muted: #a9b8ca;
      --border: #2d3f56;
      --accent: #63c9ff;
      --ok: #86f7be;
      --warn: #ffcf7a;
      --bad: #ff9d9d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(99, 201, 255, 0.18) 0%, transparent 45%),
        radial-gradient(circle at 90% 95%, rgba(99, 201, 255, 0.12) 0%, transparent 40%),
        var(--bg);
      padding: 18px;
    }

    main {
      width: min(1200px, 100%);
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      background: var(--panel);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.35);
      display: grid;
      gap: 14px;
    }

    header h1 {
      margin: 0;
      font-size: 1.4rem;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 10px;
      align-items: center;
    }

    .toolbar input[type="search"],
    .toolbar select,
    .toolbar button,
    .toolbar label {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
      font: inherit;
      padding: 9px 10px;
      line-height: 1.2;
    }

    .toolbar input[type="search"] {
      width: 100%;
      background: var(--panel-alt);
    }

    .toolbar button {
      cursor: pointer;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }

    .toolbar button:hover,
    .toolbar button:focus-visible {
      border-color: var(--accent);
      outline: none;
      transform: translateY(-1px);
    }

    .toolbar .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      user-select: none;
      cursor: pointer;
      white-space: nowrap;
    }

    .toolbar .toggle input {
      margin: 0;
      accent-color: var(--accent);
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }

    .kpi {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
      padding: 10px;
    }

    .kpi .label {
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .kpi .value {
      font-size: 1.4rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 12px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.02);
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    .family-chart {
      display: grid;
      gap: 7px;
      max-height: 390px;
      overflow: auto;
      padding-right: 4px;
    }

    .family-row {
      display: grid;
      grid-template-columns: 80px 1fr 34px;
      gap: 8px;
      align-items: center;
      cursor: pointer;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 4px;
    }

    .family-row:hover,
    .family-row:focus-visible {
      border-color: var(--accent);
      outline: none;
    }

    .family-row.active {
      border-color: rgba(99, 201, 255, 0.6);
      background: rgba(99, 201, 255, 0.08);
    }

    .family-name {
      font-family: "Consolas", "Courier New", monospace;
      font-size: 0.9rem;
    }

    .family-bar-track {
      height: 14px;
      border-radius: 999px;
      background: #102031;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .family-bar {
      height: 100%;
      background: linear-gradient(90deg, #4bbfff, #86f7be);
    }

    .family-count {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .collection-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 8px;
    }

    .collection-bubble {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px;
      background: #1a2d40;
      min-height: 86px;
      display: grid;
      align-content: center;
      gap: 5px;
      cursor: pointer;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }

    .collection-bubble:hover,
    .collection-bubble:focus-visible {
      border-color: var(--accent);
      transform: translateY(-1px);
      outline: none;
    }

    .collection-bubble.active {
      background: rgba(99, 201, 255, 0.14);
      border-color: rgba(99, 201, 255, 0.8);
    }

    .collection-label {
      font-size: 0.83rem;
      color: var(--muted);
      word-break: break-word;
    }

    .collection-value {
      font-size: 1.15rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .list-head {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .tabs {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .tab {
      border: 0;
      border-right: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      padding: 7px 10px;
      font: inherit;
      cursor: pointer;
    }

    .tab:last-child { border-right: 0; }

    .tab.active {
      background: rgba(99, 201, 255, 0.18);
      color: var(--text);
    }

    #matchCount {
      margin-left: auto;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .item-list {
      display: grid;
      gap: 8px;
      max-height: 440px;
      overflow: auto;
      padding-right: 4px;
    }

    .item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.015);
      display: grid;
      gap: 6px;
    }

    .item-top {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.75rem;
      color: var(--muted);
      font-family: "Consolas", "Courier New", monospace;
    }

    .item a {
      color: var(--accent);
      text-decoration: none;
    }

    .item a:hover,
    .item a:focus-visible {
      text-decoration: underline;
      outline: none;
    }

    .item-title {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .item-url {
      font-family: "Consolas", "Courier New", monospace;
      color: var(--muted);
      font-size: 0.8rem;
      word-break: break-all;
    }

    .empty {
      color: var(--warn);
      font-size: 0.92rem;
    }

    .foot {
      color: var(--muted);
      font-size: 0.82rem;
      text-align: right;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .toolbar { grid-template-columns: 1fr; }
      #matchCount { margin-left: 0; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>miniPCB Catalog Browser</h1>
      <p class="subtitle">Visualization of board and collection HTML pages indexed for miniPCB.com.</p>
    </header>

    <section class="toolbar" aria-label="Filters">
      <input id="searchInput" type="search" placeholder="Filter by title, part number, family, or URL..." aria-label="Filter catalog entries" />
      <select id="sortSelect" aria-label="Sort entries">
        <option value="title">Sort: Title</option>
        <option value="part">Sort: Part Number / Group</option>
        <option value="url">Sort: URL</option>
      </select>
      <button id="clearFiltersBtn" type="button">Clear Filters</button>
      <label class="toggle">
        <input id="includeDraftChk" type="checkbox" />
        Include draft pages
      </label>
    </section>

    <section id="kpis" class="kpis" aria-live="polite"></section>

    <section class="layout">
      <article class="panel">
        <h2>Board Families</h2>
        <div id="familyChart" class="family-chart" aria-live="polite"></div>
      </article>
      <article class="panel">
        <h2>Collection Groups</h2>
        <div id="collectionChart" class="collection-grid" aria-live="polite"></div>
      </article>
    </section>

    <section class="panel">
      <div class="list-head">
        <div class="tabs" role="tablist" aria-label="Entry type">
          <button id="boardsTab" class="tab active" type="button" role="tab" aria-selected="true">Boards</button>
          <button id="collectionsTab" class="tab" type="button" role="tab" aria-selected="false">Collections</button>
        </div>
        <div id="matchCount">0 results</div>
      </div>
      <div id="itemList" class="item-list"></div>
    </section>

    <p class="foot">
      Source: <code>site_index.js</code> in this repository.
    </p>
  </main>

  <script src="site_index.js"></script>
  <script>
    (function initCatalogBrowser() {
      const BASE_URL = "https://minipcb.com/";

      const nodes = {
        searchInput: document.getElementById("searchInput"),
        sortSelect: document.getElementById("sortSelect"),
        clearFiltersBtn: document.getElementById("clearFiltersBtn"),
        includeDraftChk: document.getElementById("includeDraftChk"),
        kpis: document.getElementById("kpis"),
        familyChart: document.getElementById("familyChart"),
        collectionChart: document.getElementById("collectionChart"),
        boardsTab: document.getElementById("boardsTab"),
        collectionsTab: document.getElementById("collectionsTab"),
        matchCount: document.getElementById("matchCount"),
        itemList: document.getElementById("itemList")
      };

      const state = {
        query: "",
        includeDraft: false,
        sortBy: "title",
        activeType: "board",
        selectedFamily: "all",
        selectedCollectionGroup: "all"
      };

      const rawIndex = typeof siteIndex !== "undefined" && Array.isArray(siteIndex) ? siteIndex : [];
      const normalized = normalizeEntries(rawIndex);
      const boardsAll = dedupeByUrl(normalized.filter((item) => item.type === "board"));
      const collectionsAll = dedupeByUrl(normalized.filter((item) => item.type === "collection"));

      function normalizeEntries(input) {
        return input
          .map((row) => normalizeRow(row))
          .filter(Boolean);
      }

      function normalizeRow(row) {
        const title = String(row && row.title ? row.title : "").trim();
        const url = String(row && row.url ? row.url : "").trim();
        if (!title || !url) return null;
        if (!url.toLowerCase().endsWith(".html")) return null;
        if (/^scripts\//i.test(url)) return null;
        if (/\{\{.*\}\}/.test(title) || /\{\{.*\}\}/.test(url)) return null;

        const part = extractPartNumber(title, url);
        const isCollection = detectCollection(title, url);
        const isBoard = Boolean(part);
        if (!isBoard && !isCollection) return null;

        const family = isBoard ? part.split("-")[0].toUpperCase() : "";
        const group = isCollection ? extractCollectionGroup(url) : "";
        const draft = /^draft\//i.test(url);
        const absoluteUrl = toAbsoluteUrl(url);

        return {
          title,
          url,
          absoluteUrl,
          type: isBoard ? "board" : "collection",
          part,
          family,
          group,
          draft
        };
      }

      function extractPartNumber(title, url) {
        const urlMatch = url.match(/(?:^|\/)(\d{2}[a-z]-\d{1,3})\.html$/i);
        if (urlMatch) return urlMatch[1].toUpperCase();
        const titleMatch = title.match(/\b(\d{2}[a-z]-\d{1,3})\b/i);
        if (titleMatch) return titleMatch[1].toUpperCase();
        return "";
      }

      function detectCollection(title, url) {
        if (/(^|\/)collections\//i.test(url)) return true;
        if (/^all\s/i.test(title)) return true;
        if (/\bcollection\b/i.test(title)) return true;
        return false;
      }

      function extractCollectionGroup(url) {
        if (/^draft\/collections\//i.test(url)) return "draft/collections";
        if (/^collections\//i.test(url)) return "collections";
        if (/(^|\/)collections\//i.test(url)) {
          const parts = url.split("/");
          return parts.slice(0, parts.length - 1).join("/") || "collections";
        }
        const parts = url.split("/");
        if (parts.length <= 1) return "root";
        return parts.slice(0, parts.length - 1).join("/");
      }

      function toAbsoluteUrl(relativeUrl) {
        try {
          return new URL(relativeUrl, BASE_URL).href;
        } catch (err) {
          return relativeUrl;
        }
      }

      function dedupeByUrl(items) {
        const seen = new Set();
        const out = [];
        for (const item of items) {
          if (seen.has(item.url)) continue;
          seen.add(item.url);
          out.push(item);
        }
        return out;
      }

      function matchesQuery(item, q) {
        if (!q) return true;
        const hay = [
          item.title,
          item.url,
          item.part,
          item.family,
          item.group
        ].join(" ").toLowerCase();
        return hay.includes(q);
      }

      function withDraftFilter(items) {
        return state.includeDraft ? items : items.filter((item) => !item.draft);
      }

      function getBoardCounts(boards) {
        const counts = new Map();
        for (const board of boards) {
          counts.set(board.family, (counts.get(board.family) || 0) + 1);
        }
        return Array.from(counts.entries())
          .map(([family, count]) => ({ family, count }))
          .sort((a, b) => b.count - a.count || a.family.localeCompare(b.family));
      }

      function getCollectionCounts(collections) {
        const counts = new Map();
        for (const item of collections) {
          counts.set(item.group, (counts.get(item.group) || 0) + 1);
        }
        return Array.from(counts.entries())
          .map(([group, count]) => ({ group, count }))
          .sort((a, b) => b.count - a.count || a.group.localeCompare(b.group));
      }

      function sortItems(items) {
        const list = items.slice();
        if (state.sortBy === "part") {
          list.sort((a, b) => {
            const aKey = (a.type === "board" ? a.part : a.group).toLowerCase();
            const bKey = (b.type === "board" ? b.part : b.group).toLowerCase();
            if (aKey !== bKey) return aKey.localeCompare(bKey, undefined, { numeric: true });
            return a.title.localeCompare(b.title, undefined, { numeric: true });
          });
        } else if (state.sortBy === "url") {
          list.sort((a, b) => a.url.localeCompare(b.url, undefined, { numeric: true }));
        } else {
          list.sort((a, b) => a.title.localeCompare(b.title, undefined, { numeric: true }));
        }
        return list;
      }

      function renderKpis(boardsVisible, collectionsVisible) {
        const draftBoards = boardsVisible.filter((item) => item.draft).length;
        const draftCollections = collectionsVisible.filter((item) => item.draft).length;
        const families = new Set(boardsVisible.map((item) => item.family)).size;
        const groups = new Set(collectionsVisible.map((item) => item.group)).size;
        const html = [
          kpi("Board Files", String(boardsVisible.length)),
          kpi("Collection Files", String(collectionsVisible.length)),
          kpi("Board Families", String(families)),
          kpi("Collection Groups", String(groups)),
          kpi("Draft Boards", String(draftBoards)),
          kpi("Draft Collections", String(draftCollections))
        ].join("");
        nodes.kpis.innerHTML = html;
      }

      function kpi(label, value) {
        return "<article class=\"kpi\">" +
          "<div class=\"label\">" + escapeHtml(label) + "</div>" +
          "<div class=\"value\">" + escapeHtml(value) + "</div>" +
          "</article>";
      }

      function renderFamilyChart(boardsVisible) {
        const familyCounts = getBoardCounts(boardsVisible);
        const maxCount = familyCounts.length ? familyCounts[0].count : 1;

        if (!familyCounts.length) {
          nodes.familyChart.innerHTML = "<p class=\"empty\">No board files match current filters.</p>";
          return;
        }

        nodes.familyChart.innerHTML = familyCounts.map((row) => {
          const width = Math.max(6, Math.round((row.count / maxCount) * 100));
          const active = state.selectedFamily === row.family ? " active" : "";
          return "<button type=\"button\" class=\"family-row" + active + "\" data-family=\"" + escapeHtml(row.family) + "\" aria-label=\"Filter boards by family " + escapeHtml(row.family) + "\">" +
            "<span class=\"family-name\">" + escapeHtml(row.family) + "</span>" +
            "<span class=\"family-bar-track\"><span class=\"family-bar\" style=\"width:" + width + "%\"></span></span>" +
            "<span class=\"family-count\">" + escapeHtml(String(row.count)) + "</span>" +
            "</button>";
        }).join("");

        for (const button of nodes.familyChart.querySelectorAll("[data-family]")) {
          button.addEventListener("click", () => {
            const family = button.getAttribute("data-family");
            state.activeType = "board";
            state.selectedCollectionGroup = "all";
            state.selectedFamily = state.selectedFamily === family ? "all" : family;
            render();
          });
        }
      }

      function renderCollectionChart(collectionsVisible) {
        const groupCounts = getCollectionCounts(collectionsVisible);
        const maxCount = groupCounts.length ? groupCounts[0].count : 1;

        if (!groupCounts.length) {
          nodes.collectionChart.innerHTML = "<p class=\"empty\">No collection files match current filters.</p>";
          return;
        }

        nodes.collectionChart.innerHTML = groupCounts.map((row) => {
          const alpha = (0.28 + (row.count / maxCount) * 0.36).toFixed(2);
          const active = state.selectedCollectionGroup === row.group ? " active" : "";
          return "<button type=\"button\" class=\"collection-bubble" + active + "\" data-group=\"" + escapeHtml(row.group) + "\" style=\"background: rgba(99,201,255," + alpha + ");\" aria-label=\"Filter collections by group " + escapeHtml(row.group) + "\">" +
            "<span class=\"collection-label\">" + escapeHtml(row.group) + "</span>" +
            "<span class=\"collection-value\">" + escapeHtml(String(row.count)) + "</span>" +
            "</button>";
        }).join("");

        for (const button of nodes.collectionChart.querySelectorAll("[data-group]")) {
          button.addEventListener("click", () => {
            const group = button.getAttribute("data-group");
            state.activeType = "collection";
            state.selectedFamily = "all";
            state.selectedCollectionGroup = state.selectedCollectionGroup === group ? "all" : group;
            render();
          });
        }
      }

      function renderList(boardsVisible, collectionsVisible) {
        nodes.boardsTab.classList.toggle("active", state.activeType === "board");
        nodes.collectionsTab.classList.toggle("active", state.activeType === "collection");
        nodes.boardsTab.setAttribute("aria-selected", state.activeType === "board" ? "true" : "false");
        nodes.collectionsTab.setAttribute("aria-selected", state.activeType === "collection" ? "true" : "false");

        let items = state.activeType === "board" ? boardsVisible : collectionsVisible;
        if (state.activeType === "board" && state.selectedFamily !== "all") {
          items = items.filter((item) => item.family === state.selectedFamily);
        }
        if (state.activeType === "collection" && state.selectedCollectionGroup !== "all") {
          items = items.filter((item) => item.group === state.selectedCollectionGroup);
        }

        const sorted = sortItems(items);
        nodes.matchCount.textContent = String(sorted.length) + " result" + (sorted.length === 1 ? "" : "s");

        if (!sorted.length) {
          nodes.itemList.innerHTML = "<p class=\"empty\">No entries match current filters.</p>";
          return;
        }

        nodes.itemList.innerHTML = sorted.map((item) => {
          const badge = item.type === "board" ? item.part : item.group;
          const family = item.type === "board" ? "<span class=\"badge\">Family " + escapeHtml(item.family) + "</span>" : "";
          const draft = item.draft ? "<span class=\"badge\">draft</span>" : "";
          return "<article class=\"item\">" +
            "<div class=\"item-top\">" +
              "<span class=\"badge\">" + escapeHtml(badge) + "</span>" +
              family +
              draft +
            "</div>" +
            "<div class=\"item-title\">" + escapeHtml(item.title) + "</div>" +
            "<a href=\"" + escapeHtml(item.absoluteUrl) + "\" target=\"_blank\" rel=\"noopener noreferrer\">Open on miniPCB.com</a>" +
            "<div class=\"item-url\">" + escapeHtml(item.url) + "</div>" +
          "</article>";
        }).join("");
      }

      function render() {
        const query = state.query.trim().toLowerCase();
        const boardsVisible = withDraftFilter(boardsAll).filter((item) => matchesQuery(item, query));
        const collectionsVisible = withDraftFilter(collectionsAll).filter((item) => matchesQuery(item, query));
        renderKpis(boardsVisible, collectionsVisible);
        renderFamilyChart(boardsVisible);
        renderCollectionChart(collectionsVisible);
        renderList(boardsVisible, collectionsVisible);
      }

      function clearFilters() {
        state.query = "";
        state.includeDraft = false;
        state.sortBy = "title";
        state.selectedFamily = "all";
        state.selectedCollectionGroup = "all";
        nodes.searchInput.value = "";
        nodes.includeDraftChk.checked = false;
        nodes.sortSelect.value = "title";
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      nodes.searchInput.addEventListener("input", () => {
        state.query = nodes.searchInput.value;
        render();
      });

      nodes.sortSelect.addEventListener("change", () => {
        state.sortBy = nodes.sortSelect.value;
        render();
      });

      nodes.includeDraftChk.addEventListener("change", () => {
        state.includeDraft = nodes.includeDraftChk.checked;
        if (!state.includeDraft) {
          if (state.activeType === "board" && state.selectedFamily !== "all") {
            const hasFamily = withDraftFilter(boardsAll).some((item) => item.family === state.selectedFamily);
            if (!hasFamily) state.selectedFamily = "all";
          }
          if (state.activeType === "collection" && state.selectedCollectionGroup !== "all") {
            const hasGroup = withDraftFilter(collectionsAll).some((item) => item.group === state.selectedCollectionGroup);
            if (!hasGroup) state.selectedCollectionGroup = "all";
          }
        }
        render();
      });

      nodes.clearFiltersBtn.addEventListener("click", () => {
        clearFilters();
        render();
      });

      nodes.boardsTab.addEventListener("click", () => {
        state.activeType = "board";
        state.selectedCollectionGroup = "all";
        render();
      });

      nodes.collectionsTab.addEventListener("click", () => {
        state.activeType = "collection";
        state.selectedFamily = "all";
        render();
      });

      clearFilters();
      render();
    })();
  </script>
</body>
</html>
