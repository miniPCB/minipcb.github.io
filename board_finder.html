<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>miniPCB Board Finder</title>
  <style>
    :root {
      --bg: #0f1720;
      --panel: #172433;
      --text: #e7eef7;
      --muted: #a9b8ca;
      --border: #2d3f56;
      --accent: #63c9ff;
      --ok: #86f7be;
      --warn: #ffcf7a;
      --bad: #ff9d9d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(99, 201, 255, 0.18) 0%, transparent 45%),
        radial-gradient(circle at 90% 95%, rgba(99, 201, 255, 0.12) 0%, transparent 40%),
        var(--bg);
    }

    main {
      width: min(1040px, 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      background: var(--panel);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.35);
      display: grid;
      gap: 14px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.45rem;
      letter-spacing: 0.02em;
    }

    p { margin: 0; }

    .subtitle {
      color: var(--muted);
      margin-bottom: 8px;
    }

    .back-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-link:hover,
    .back-link:focus-visible {
      text-decoration: underline;
      outline: none;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      align-items: start;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
      padding: 14px;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 8px;
    }

    .progress-text {
      font-size: 0.86rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .question-title {
      margin: 0 0 8px;
      font-size: 1.2rem;
    }

    .question-subtitle {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .option-list {
      display: grid;
      gap: 9px;
    }

    .option-btn,
    .action-btn,
    .result-link,
    .send-btn {
      display: block;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.02);
      transition: border-color 0.15s ease, transform 0.15s ease;
      cursor: pointer;
      font: inherit;
      text-align: left;
    }

    .option-btn,
    .action-btn,
    .result-link,
    .send-btn {
      padding: 11px 12px;
    }

    .option-btn:hover,
    .option-btn:focus-visible,
    .action-btn:hover,
    .action-btn:focus-visible,
    .result-link:hover,
    .result-link:focus-visible,
    .send-btn:hover,
    .send-btn:focus-visible {
      border-color: var(--accent);
      transform: translateY(-1px);
      outline: none;
    }

    .option-btn.selected {
      border-color: var(--accent);
      background: rgba(99, 201, 255, 0.12);
    }

    .option-label {
      font-weight: 600;
      margin-bottom: 2px;
      display: block;
    }

    .option-help {
      color: var(--muted);
      font-size: 0.86rem;
      display: block;
    }

    .wizard-actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .action-btn {
      width: auto;
      min-width: 120px;
      text-align: center;
      padding: 9px 12px;
    }

    .action-btn[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .summary-line {
      color: var(--muted);
      margin: 0 0 10px;
      font-size: 0.92rem;
    }

    .result-list {
      display: grid;
      gap: 10px;
    }

    .result-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.015);
    }

    .result-name {
      margin: 0 0 4px;
      font-size: 1rem;
    }

    .result-copy {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .result-match {
      margin: 0 0 8px;
      font-size: 0.83rem;
      color: var(--warn);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .result-link {
      display: inline-block;
      width: auto;
      padding: 8px 10px;
      font-size: 0.88rem;
    }

    .collection-link {
      border-color: rgba(99, 201, 255, 0.7);
      background: rgba(99, 201, 255, 0.12);
    }

    .board-link {
      border-color: rgba(255, 207, 122, 0.72);
      background: rgba(255, 207, 122, 0.1);
      font-family: "Consolas", "Courier New", monospace;
      letter-spacing: 0.01em;
    }

    .section-title {
      margin: 12px 0 8px;
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .text-search-input {
      min-height: 130px;
      font-size: 0.95rem;
    }

    .feedback-title {
      margin: 0 0 6px;
      font-size: 1.02rem;
    }

    .form-row {
      margin-bottom: 9px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #1d2c3d;
      color: var(--text);
      padding: 8px 10px;
      font: inherit;
    }

    textarea {
      min-height: 102px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 2px rgba(99, 201, 255, 0.12);
    }

    .send-btn {
      text-align: center;
      font-weight: 600;
      margin-top: 4px;
    }

    .feedback-status {
      margin-top: 8px;
      font-size: 0.84rem;
      color: var(--muted);
      min-height: 1.2em;
    }

    .feedback-status.ok { color: var(--ok); }
    .feedback-status.bad { color: var(--bad); }
    .hidden { display: none; }

    @media (max-width: 900px) {
      .action-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>miniPCB Board Finder</h1>
    </header>

    <div class="layout">
      <section id="wizardCard" class="card" aria-live="polite">
        <div class="progress-row">
          <div id="progressText" class="progress-text">Step 1 of 3</div>
          <button id="restartBtn" type="button" class="action-btn">Start Over</button>
        </div>
        <div id="wizardHost"></div>
        <div class="wizard-actions">
          <button id="backBtn" type="button" class="action-btn" disabled>Back</button>
          <button id="openFeedbackBtn" type="button" class="action-btn">Send Feedback</button>
        </div>
      </section>

      <section id="feedbackCard" class="card hidden">
        <h2 class="feedback-title">Send Feedback</h2>
        <form id="feedbackForm" novalidate>
          <div class="form-row">
            <label for="fbName">Name</label>
            <input id="fbName" name="name" type="text" required />
          </div>
          <div class="form-row">
            <label for="fbEmail">Email</label>
            <input id="fbEmail" name="email" type="email" required />
          </div>
          <div class="form-row">
            <label for="fbFocus">What are you trying to build?</label>
            <input id="fbFocus" name="focus" type="text" required />
          </div>
          <div class="form-row">
            <label for="fbDetails">Feedback Details</label>
            <textarea id="fbDetails" name="details" required></textarea>
          </div>
          <button id="sendFeedbackBtn" type="submit" class="send-btn">Send Feedback</button>
          <p id="feedbackStatus" class="feedback-status" aria-live="polite"></p>
          <div class="wizard-actions">
            <button id="closeFeedbackBtn" type="button" class="action-btn">Back</button>
          </div>
        </form>
      </section>
    </div>
  </main>

  <script>
    const PART_REQUEST_API_URL = "https://minipcb-github-io.vercel.app/api/part-request";
    const PART_REQUEST_PROXY_KEY = "";

    const QUESTIONS = [
      {
        key: "topic",
        title: "What should learners explore first?",
        subtitle: "Choose the core technical area for this lab set.",
        options: [
          { value: "amplifiers", label: "Amplifiers", help: "Signal gain, transistor stages, and op-amp behavior." },
          { value: "filters", label: "Filters and frequency response", help: "Low-pass, high-pass, and active filter labs." },
          { value: "power", label: "Power and regulation", help: "Supply rails, switching, and charge-pump concepts." },
          { value: "digital", label: "Digital and timing", help: "555 timing, waveform generation, and logic fundamentals." },
          { value: "interfaces", label: "Interfaces and measurement", help: "Probe points, instrumentation, and interface boards." }
        ]
      },
      {
        key: "level",
        title: "What learner level are you planning for?",
        subtitle: "This controls how foundational versus specialized the recommendations are.",
        options: [
          { value: "beginner", label: "Beginner", help: "Simple board setups for first-pass lab confidence." },
          { value: "intermediate", label: "Intermediate", help: "Balanced fundamentals with practical variation." },
          { value: "advanced", label: "Advanced", help: "Denser workflows and deeper analysis opportunities." }
        ]
      },
      {
        key: "style",
        title: "Which lab style fits best?",
        subtitle: "Pick the strongest emphasis for your class workflow.",
        options: [
          { value: "guided", label: "Guided experiments", help: "Step-by-step boards with clear checkpoints." },
          { value: "hands-on", label: "Build and measure", help: "Frequent probe use and live tuning." },
          { value: "analysis", label: "Analyze and compare", help: "Explore tradeoffs across variants and topologies." },
          { value: "system", label: "System integration", help: "Boards used in larger workflows and interfaces." }
        ]
      }
    ];

    const RECOMMENDATIONS = [
      {
        title: "Transistor Amplifiers",
        url: "collections/transistor-amplifiers.html",
        summary: "Single and multi-stage transistor amplifier boards with clear teaching points.",
        tags: { topic: ["amplifiers"], level: ["beginner", "intermediate"], style: ["guided", "hands-on", "analysis"] }
      },
      {
        title: "Op-Amp Amplifiers",
        url: "collections/opamp-amplifiers.html",
        summary: "Op-amp gain blocks and practical conditioning circuits for analog labs.",
        tags: { topic: ["amplifiers"], level: ["intermediate", "advanced"], style: ["hands-on", "analysis", "system"] }
      },
      {
        title: "RC Filters",
        url: "collections/rc-filters.html",
        summary: "Filter behavior boards that make cutoff and response changes easy to observe.",
        tags: { topic: ["filters"], level: ["beginner", "intermediate"], style: ["guided", "hands-on", "analysis"] }
      },
      {
        title: "Oscillators",
        url: "collections/oscillators.html",
        summary: "Oscillator boards for waveform generation, startup, and stability exploration.",
        tags: { topic: ["filters", "digital"], level: ["intermediate", "advanced"], style: ["hands-on", "analysis"] }
      },
      {
        title: "555 Timer Circuits",
        url: "collections/555-timer-circuits.html",
        summary: "Timer-based circuits for pulse generation, duty cycle, and classroom timing labs.",
        tags: { topic: ["digital"], level: ["beginner", "intermediate"], style: ["guided", "hands-on"] }
      },
      {
        title: "Digital Fundamentals",
        url: "collections/digital-fundamentals.html",
        summary: "Core digital behavior boards for logic and timing demonstrations.",
        tags: { topic: ["digital"], level: ["beginner", "intermediate"], style: ["guided", "system"] }
      },
      {
        title: "Power and Voltage",
        url: "collections/power-voltage.html",
        summary: "Boards focused on regulated rails, references, and voltage behavior.",
        tags: { topic: ["power"], level: ["beginner", "intermediate"], style: ["guided", "hands-on", "system"] }
      },
      {
        title: "Power Switching",
        url: "collections/power-switching.html",
        summary: "Switching-oriented board set for efficiency, control, and load behavior labs.",
        tags: { topic: ["power"], level: ["intermediate", "advanced"], style: ["analysis", "system"] }
      },
      {
        title: "Power Charge Pumps",
        url: "collections/power-charge-pumps.html",
        summary: "Charge-pump and conversion examples for compact power architecture lessons.",
        tags: { topic: ["power"], level: ["intermediate", "advanced"], style: ["analysis", "system"] }
      },
      {
        title: "Interface Boards",
        url: "collections/interface-boards.html",
        summary: "Signal and connector interface boards for larger bench setups.",
        tags: { topic: ["interfaces"], level: ["beginner", "intermediate", "advanced"], style: ["hands-on", "system"] }
      },
      {
        title: "Probe Boards",
        url: "collections/probe-boards.html",
        summary: "Probe-friendly boards that simplify measurement access and debugging.",
        tags: { topic: ["interfaces"], level: ["beginner", "intermediate", "advanced"], style: ["hands-on", "analysis"] }
      },
      {
        title: "Prototyping Boards",
        url: "collections/prototyping-boards.html",
        summary: "Flexible starting boards for quick experimentation and idea validation.",
        tags: { topic: ["interfaces", "digital", "amplifiers", "power", "filters"], level: ["beginner", "intermediate"], style: ["guided", "hands-on", "system"] }
      },
      {
        title: "Comparators",
        url: "collections/comparators.html",
        summary: "Threshold and decision circuits useful for mixed analog-digital exercises.",
        tags: { topic: ["digital", "interfaces"], level: ["intermediate", "advanced"], style: ["analysis", "system"] }
      }
    ];

    const BOARD_RECOMMENDATIONS = [
      {
        title: "04B-005 Common Emitter Amplifier",
        url: "04B/04B-005.html",
        summary: "BJT gain stage for biasing and small-signal amplifier labs.",
        tags: { topic: ["amplifiers"], level: ["beginner", "intermediate"], style: ["guided", "hands-on", "analysis"] },
        keywords: ["04b-005", "common emitter", "amplifier", "bjt", "transistor", "gain"]
      },
      {
        title: "04A-005 Inverting Amplifier",
        url: "04A/04A-005.html",
        summary: "Classic op-amp inversion behavior with predictable gain settings.",
        tags: { topic: ["amplifiers"], level: ["beginner", "intermediate"], style: ["guided", "hands-on"] },
        keywords: ["04a-005", "inverting amplifier", "op-amp", "op amp", "gain"]
      },
      {
        title: "05B-06 Single Feedback Low Pass",
        url: "05/05B-06.html",
        summary: "Single-feedback low-pass filter for cutoff exploration.",
        tags: { topic: ["filters"], level: ["beginner", "intermediate"], style: ["guided", "analysis"] },
        keywords: ["05b-06", "single feedback", "low pass", "filter", "frequency response"]
      },
      {
        title: "05B-05 Active Notch Filter",
        url: "05/05B-05.html",
        summary: "Notch behavior board for rejection and bandwidth comparison.",
        tags: { topic: ["filters"], level: ["intermediate", "advanced"], style: ["analysis", "hands-on"] },
        keywords: ["05b-05", "notch filter", "active filter", "band stop", "frequency rejection"]
      },
      {
        title: "06B-05 555 Timer Oscillator",
        url: "06/06B-05.html",
        summary: "Classic 555 timing circuit for duty-cycle and frequency experiments.",
        tags: { topic: ["digital"], level: ["beginner", "intermediate"], style: ["guided", "hands-on"] },
        keywords: ["06b-05", "555", "timer", "oscillator", "pulse", "duty cycle"]
      },
      {
        title: "08H-04 Window Comparator",
        url: "08H/08H-04.html",
        summary: "Comparator window detection board for threshold studies.",
        tags: { topic: ["digital", "interfaces"], level: ["intermediate", "advanced"], style: ["analysis", "system"] },
        keywords: ["08h-04", "window comparator", "comparator", "threshold", "hysteresis"]
      },
      {
        title: "09A-13 Shunt Regulator",
        url: "09A/09A-13.html",
        summary: "Entry linear regulation board to study line/load regulation.",
        tags: { topic: ["power"], level: ["beginner", "intermediate"], style: ["guided", "hands-on"] },
        keywords: ["09a-13", "shunt regulator", "linear regulator", "voltage regulation"]
      },
      {
        title: "09H-10 Buck Converter (LM2574)",
        url: "09H/09H-10.html",
        summary: "Switching step-down converter board for efficiency and ripple labs.",
        tags: { topic: ["power"], level: ["intermediate", "advanced"], style: ["analysis", "system"] },
        keywords: ["09h-10", "buck converter", "switching regulator", "step-down", "lm2574"]
      },
      {
        title: "10A-20 D Flip-Flop",
        url: "10/10A-20.html",
        summary: "Sequential logic board for latch timing and state behavior.",
        tags: { topic: ["digital"], level: ["beginner", "intermediate"], style: ["guided", "system"] },
        keywords: ["10a-20", "d flip-flop", "flip flop", "sequential logic", "clock"]
      },
      {
        title: "00A-011 miniPCB Dock, BNC",
        url: "00A/00A-011.html",
        summary: "Bench-friendly dock board for instrument-cable interfacing.",
        tags: { topic: ["interfaces"], level: ["beginner", "intermediate", "advanced"], style: ["hands-on", "system"] },
        keywords: ["00a-011", "dock", "bnc", "interface", "measurement", "bench"]
      },
      {
        title: "00A-002 Probe Board, 4P",
        url: "00A/00A-002.html",
        summary: "Simple probe access board for quick measurement workflows.",
        tags: { topic: ["interfaces"], level: ["beginner", "intermediate"], style: ["hands-on", "analysis"] },
        keywords: ["00a-002", "probe board", "test points", "measurement", "debug"]
      },
      {
        title: "00A-32 Protoboard, Vscored, 9 Pieces",
        url: "00A/00A-32.html",
        summary: "General prototyping board for rapid concept iteration.",
        tags: { topic: ["interfaces", "digital", "amplifiers", "filters", "power"], level: ["beginner", "intermediate"], style: ["guided", "hands-on", "system"] },
        keywords: ["00a-32", "protoboard", "prototype", "vscored", "rapid build"]
      }
    ];

    const TEXT_HINTS = {
      topic: {
        amplifiers: ["amplifier", "gain", "op-amp", "op amp", "bjt", "transistor", "instrumentation"],
        filters: ["filter", "low pass", "high pass", "band pass", "notch", "frequency response"],
        power: ["power", "regulator", "buck", "boost", "charge pump", "converter", "voltage"],
        digital: ["digital", "logic", "flip-flop", "flip flop", "nand", "nor", "pulse", "timer", "schmitt"],
        interfaces: ["interface", "probe", "dock", "testpoint", "measurement", "bench", "prototyping", "prototype"]
      },
      level: {
        beginner: ["beginner", "intro", "basic", "first semester", "foundation", "simple"],
        intermediate: ["intermediate", "second semester", "applied", "mixed"],
        advanced: ["advanced", "deep", "optimization", "high performance", "research"]
      },
      style: {
        guided: ["guided", "step by step", "worksheet", "lab manual"],
        "hands-on": ["hands-on", "hands on", "build", "measure", "bench test", "probe"],
        analysis: ["analysis", "analyze", "compare", "tradeoff", "characterize"],
        system: ["system", "integration", "interface", "module", "end-to-end", "end to end"]
      }
    };

    const state = {
      process: "select",
      stepIndex: 0,
      textQuery: "",
      textSubmitted: false,
      feedbackOpen: false,
      answers: {
        topic: null,
        level: null,
        style: null
      }
    };

    const nodes = {
      wizardCard: document.getElementById("wizardCard"),
      feedbackCard: document.getElementById("feedbackCard"),
      progressText: document.getElementById("progressText"),
      wizardHost: document.getElementById("wizardHost"),
      backBtn: document.getElementById("backBtn"),
      restartBtn: document.getElementById("restartBtn"),
      openFeedbackBtn: document.getElementById("openFeedbackBtn"),
      closeFeedbackBtn: document.getElementById("closeFeedbackBtn"),
      feedbackForm: document.getElementById("feedbackForm"),
      feedbackStatus: document.getElementById("feedbackStatus"),
      fbName: document.getElementById("fbName"),
      fbEmail: document.getElementById("fbEmail"),
      fbFocus: document.getElementById("fbFocus"),
      fbDetails: document.getElementById("fbDetails"),
      sendFeedbackBtn: document.getElementById("sendFeedbackBtn")
    };

    function setFeedbackOpen(isOpen) {
      state.feedbackOpen = Boolean(isOpen);
      nodes.wizardCard.classList.toggle("hidden", state.feedbackOpen);
      nodes.feedbackCard.classList.toggle("hidden", !state.feedbackOpen);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function labelFor(key, value) {
      const question = QUESTIONS.find((item) => item.key === key);
      if (!question) return String(value || "");
      const option = question.options.find((item) => item.value === value);
      return option ? option.label : String(value || "");
    }

    function selectionSummaryText() {
      const topic = state.answers.topic ? labelFor("topic", state.answers.topic) : "Not selected";
      const level = state.answers.level ? labelFor("level", state.answers.level) : "Not selected";
      const style = state.answers.style ? labelFor("style", state.answers.style) : "Not selected";
      return "Topic: " + topic + " | Level: " + level + " | Style: " + style;
    }

    function currentContextSummary() {
      const lines = [];
      if (state.process === "buttons") {
        lines.push("Search process: Buttons");
        lines.push(selectionSummaryText());
      } else if (state.process === "text") {
        lines.push("Search process: Textual");
        if (state.textQuery.trim()) lines.push("Query: " + state.textQuery.trim());
      }
      return lines.join("\n");
    }

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase();
    }

    function inferProfileFromText(query) {
      const q = normalizeText(query);
      const profile = {
        topics: new Set(),
        levels: new Set(),
        styles: new Set()
      };

      for (const [key, list] of Object.entries(TEXT_HINTS.topic)) {
        if (list.some((word) => q.includes(word))) profile.topics.add(key);
      }
      for (const [key, list] of Object.entries(TEXT_HINTS.level)) {
        if (list.some((word) => q.includes(word))) profile.levels.add(key);
      }
      for (const [key, list] of Object.entries(TEXT_HINTS.style)) {
        if (list.some((word) => q.includes(word))) profile.styles.add(key);
      }
      return profile;
    }

    function stepCount() {
      return QUESTIONS.length;
    }

    function renderQuestionStep(question) {
      const currentValue = state.answers[question.key];
      const optionsHtml = question.options.map((option) => {
        const selectedClass = option.value === currentValue ? " selected" : "";
        return "<button type=\"button\" class=\"option-btn" + selectedClass + "\" data-option=\"" +
          escapeHtml(option.value) + "\">" +
          "<span class=\"option-label\">" + escapeHtml(option.label) + "</span>" +
          "<span class=\"option-help\">" + escapeHtml(option.help) + "</span>" +
          "</button>";
      }).join("");

      nodes.wizardHost.innerHTML =
        "<h2 class=\"question-title\">" + escapeHtml(question.title) + "</h2>" +
        "<p class=\"question-subtitle\">" + escapeHtml(question.subtitle) + "</p>" +
        "<div class=\"option-list\">" + optionsHtml + "</div>";

      for (const button of nodes.wizardHost.querySelectorAll("[data-option]")) {
        button.addEventListener("click", () => {
          state.answers[question.key] = button.getAttribute("data-option");
          if (state.stepIndex < stepCount() - 1) {
            state.stepIndex += 1;
          } else {
            state.stepIndex = stepCount();
          }
          render();
        });
      }
    }

    function scoreByTags(item) {
      let score = 0;
      const reasons = [];

      if (state.answers.topic && item.tags.topic.includes(state.answers.topic)) {
        score += 5;
        reasons.push("topic: " + labelFor("topic", state.answers.topic));
      }
      if (state.answers.level && item.tags.level.includes(state.answers.level)) {
        score += 3;
        reasons.push("level: " + labelFor("level", state.answers.level));
      }
      if (state.answers.style && item.tags.style.includes(state.answers.style)) {
        score += 2;
        reasons.push("style: " + labelFor("style", state.answers.style));
      }

      return { score, reasons };
    }

    function scoreByText(item, query, profile) {
      const q = normalizeText(query);
      let score = 0;
      const reasonSet = new Set();
      const matchedKeywords = [];

      if (Array.isArray(item.keywords)) {
        for (const keyword of item.keywords) {
          if (q.includes(String(keyword).toLowerCase())) {
            score += 2;
            matchedKeywords.push(keyword);
          }
        }
      }

      if (matchedKeywords.length) {
        reasonSet.add("keywords: " + matchedKeywords.slice(0, 3).join(", "));
      }

      if (q && q.includes(item.title.toLowerCase())) {
        score += 4;
        reasonSet.add("title match");
      }

      const partMatch = q.match(/\b\d{2}[a-z]-\d{2,3}\b/i);
      if (partMatch) {
        const part = partMatch[0].toLowerCase();
        if (item.url.toLowerCase().includes(part) || item.title.toLowerCase().includes(part)) {
          score += 8;
          reasonSet.add("part number match");
        }
      }

      for (const topic of profile.topics) {
        if (item.tags.topic.includes(topic)) {
          score += 4;
          reasonSet.add("topic intent");
        }
      }
      for (const level of profile.levels) {
        if (item.tags.level.includes(level)) {
          score += 2;
          reasonSet.add("level intent");
        }
      }
      for (const style of profile.styles) {
        if (item.tags.style.includes(style)) {
          score += 1;
          reasonSet.add("lab style intent");
        }
      }

      return { score, reasons: Array.from(reasonSet) };
    }

    function rankByTags(items, limit) {
      const ranked = items.map((item) => {
        const meta = scoreByTags(item);
        return { item, score: meta.score, reasons: meta.reasons };
      });

      ranked.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return a.item.title.localeCompare(b.item.title);
      });

      const scoredOnly = ranked.filter((row) => row.score > 0);
      return (scoredOnly.length ? scoredOnly : ranked).slice(0, limit);
    }

    function rankByText(items, query, limit) {
      const profile = inferProfileFromText(query);
      const ranked = items.map((item) => {
        const meta = scoreByText(item, query, profile);
        return { item, score: meta.score, reasons: meta.reasons };
      });

      ranked.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return a.item.title.localeCompare(b.item.title);
      });

      const scoredOnly = ranked.filter((row) => row.score > 0);
      return (scoredOnly.length ? scoredOnly : ranked).slice(0, limit);
    }

    function renderProcessSelector() {
      nodes.wizardHost.innerHTML =
        "<div class=\"option-list\">" +
          "<button type=\"button\" class=\"option-btn\" data-process=\"text\">" +
            "<span class=\"option-label\">Textual Search</span>" +
            "<span class=\"option-help\">Describe what you want.</span>" +
          "</button>" +
          "<button type=\"button\" class=\"option-btn\" data-process=\"buttons\">" +
            "<span class=\"option-label\">Button Search</span>" +
            "<span class=\"option-help\">Click through options.</span>" +
          "</button>" +
        "</div>";

      for (const button of nodes.wizardHost.querySelectorAll("[data-process]")) {
        button.addEventListener("click", () => {
          const mode = button.getAttribute("data-process");
          if (mode === "text") {
            state.process = "text";
            state.textSubmitted = false;
          } else {
            state.process = "buttons";
            state.stepIndex = 0;
          }
          render();
        });
      }
    }

    function renderTextPromptStep() {
      nodes.wizardHost.innerHTML =
        "<div class=\"form-row\">" +
          "<label for=\"textSearchInput\">Design Goal</label>" +
          "<textarea id=\"textSearchInput\" class=\"text-search-input\" placeholder=\"Example: I need a beginner-friendly lab for op-amp filtering and frequency response.\"></textarea>" +
        "</div>" +
        "<button id=\"runTextSearchBtn\" type=\"button\" class=\"action-btn\">Find Recommendations</button>" +
        "<p id=\"textSearchStatus\" class=\"feedback-status\" aria-live=\"polite\"></p>";

      const textArea = document.getElementById("textSearchInput");
      const runBtn = document.getElementById("runTextSearchBtn");
      const status = document.getElementById("textSearchStatus");
      textArea.value = state.textQuery;

      textArea.addEventListener("input", () => {
        state.textQuery = textArea.value;
      });

      runBtn.addEventListener("click", () => {
        if (!state.textQuery.trim()) {
          status.textContent = "Enter a design description before searching.";
          status.className = "feedback-status bad";
          return;
        }
        state.textSubmitted = true;
        render();
      });
    }

    function renderResultRows(rows, linkClass, linkLabel) {
      if (!rows.length) {
        return "<article class=\"result-item\"><p class=\"result-copy\">No matches found.</p></article>";
      }

      return rows.map((row) => {
        const reasonText = row.reasons.length ? row.reasons.join(" | ") : "general fit";
        return "<article class=\"result-item\">" +
          "<h3 class=\"result-name\">" + escapeHtml(row.item.title) + "</h3>" +
          "<p class=\"result-copy\">" + escapeHtml(row.item.summary) + "</p>" +
          "<p class=\"result-match\">Match: " + escapeHtml(reasonText) + "</p>" +
          "<a class=\"result-link " + escapeHtml(linkClass) + "\" href=\"" + escapeHtml(row.item.url) + "\">" + escapeHtml(linkLabel) + "</a>" +
          "</article>";
      }).join("");
    }

    function renderResultsStep(mode) {
      const isText = mode === "text";
      const summary = isText ? "Query: " + state.textQuery.trim() : selectionSummaryText();
      const collectionRows = isText
        ? rankByText(RECOMMENDATIONS, state.textQuery, 5)
        : rankByTags(RECOMMENDATIONS, 5);
      const boardRows = isText
        ? rankByText(BOARD_RECOMMENDATIONS, state.textQuery, 6)
        : rankByTags(BOARD_RECOMMENDATIONS, 6);
      const title = isText ? "Recommendations from Textual Search" : "Recommendations from Button Search";

      nodes.wizardHost.innerHTML =
        "<h2 class=\"question-title\">" + escapeHtml(title) + "</h2>" +
        "<p class=\"summary-line\">" + escapeHtml(summary) + "</p>" +
        "<p class=\"section-title\">Collection Pages</p>" +
        "<div class=\"result-list\">" + renderResultRows(collectionRows, "collection-link", "Open Collection Page") + "</div>" +
        "<p class=\"section-title\">Board Pages</p>" +
        "<div class=\"result-list\">" + renderResultRows(boardRows, "board-link", "Open Board Page") + "</div>";
    }

    function render() {
      if (state.process === "select") {
        nodes.progressText.textContent = "Choose Search Process";
        nodes.backBtn.disabled = true;
        renderProcessSelector();
        return;
      }

      nodes.backBtn.disabled = false;

      if (state.process === "buttons") {
        if (state.stepIndex < stepCount()) {
          const stepNumber = state.stepIndex + 1;
          nodes.progressText.textContent = "Buttons: Step " + stepNumber + " of " + stepCount();
          renderQuestionStep(QUESTIONS[state.stepIndex]);
        } else {
          nodes.progressText.textContent = "Buttons: Recommendations Ready";
          renderResultsStep("buttons");
        }
        return;
      }

      if (!state.textSubmitted) {
        nodes.progressText.textContent = "Textual Search";
        renderTextPromptStep();
      } else {
        nodes.progressText.textContent = "Textual: Recommendations Ready";
        renderResultsStep("text");
      }
    }

    nodes.backBtn.addEventListener("click", () => {
      if (state.process === "select") return;

      if (state.process === "buttons") {
        if (state.stepIndex === 0) {
          state.process = "select";
        } else if (state.stepIndex > stepCount() - 1) {
          state.stepIndex = stepCount() - 1;
        } else {
          state.stepIndex -= 1;
        }
      } else if (state.process === "text") {
        if (state.textSubmitted) {
          state.textSubmitted = false;
        } else {
          state.process = "select";
        }
      }

      render();
    });

    function resetFinder() {
      state.process = "select";
      state.stepIndex = 0;
      state.textQuery = "";
      state.textSubmitted = false;
      state.answers.topic = null;
      state.answers.level = null;
      state.answers.style = null;
    }

    nodes.restartBtn.addEventListener("click", () => {
      resetFinder();
      render();
    });
    nodes.openFeedbackBtn.addEventListener("click", () => setFeedbackOpen(true));
    nodes.closeFeedbackBtn.addEventListener("click", () => setFeedbackOpen(false));

    nodes.feedbackForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!nodes.feedbackForm.reportValidity()) {
        nodes.feedbackStatus.textContent = "Complete all required feedback fields before sending.";
        nodes.feedbackStatus.className = "feedback-status bad";
        return;
      }

      const payload = {
        name: nodes.fbName.value.trim(),
        email: nodes.fbEmail.value.trim(),
        organization: "",
        family: "Board Finder Feedback",
        partNumber: nodes.fbFocus.value.trim(),
        details: nodes.fbDetails.value.trim()
      };
      const contextSummary = currentContextSummary();
      if (contextSummary) {
        payload.details += "\n\nBoard Finder Context:\n" + contextSummary;
      }

      nodes.sendFeedbackBtn.disabled = true;
      nodes.feedbackStatus.textContent = "Sending feedback...";
      nodes.feedbackStatus.className = "feedback-status";

      try {
        const headers = {
          "Content-Type": "application/json"
        };
        if (PART_REQUEST_PROXY_KEY) headers["X-Proxy-Key"] = PART_REQUEST_PROXY_KEY;

        const response = await fetch(PART_REQUEST_API_URL, {
          method: "POST",
          headers,
          body: JSON.stringify(payload)
        });

        const result = await response.json().catch(() => ({}));

        if (!response.ok || !result.ok) {
          const message = result && result.error ? result.error : "Feedback request failed.";
          throw new Error(message);
        }

        nodes.feedbackStatus.textContent = "Feedback sent successfully.";
        nodes.feedbackStatus.className = "feedback-status ok";
        nodes.feedbackForm.reset();
      } catch (err) {
        nodes.feedbackStatus.textContent = "Unable to send feedback: " + String(err && err.message ? err.message : err);
        nodes.feedbackStatus.className = "feedback-status bad";
      } finally {
        nodes.sendFeedbackBtn.disabled = false;
      }
    });

    setFeedbackOpen(false);
    render();
  </script>
</body>
</html>
